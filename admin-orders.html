<!DOCTYPE html><html>
<head>
<title>Admin Orders</title>
<link rel="stylesheet" href="style.css">
</head><body><h1>Admin Order Dashboard</h1><div id="orders"></div><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import { 
getFirestore, 
collection, 
onSnapshot, 
updateDoc, 
doc 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCIkDJkmm5FvMw1M_F1FviMwcG_httuwcA",
authDomain: "foodie-mart-3e2a0.firebaseapp.com",
projectId: "foodie-mart-3e2a0",
storageBucket: "foodie-mart-3e2a0.appspot.com",
messagingSenderId: "591650958110",
appId: "1:591650958110:web:c453955af7c3bb0c77770f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const container = document.getElementById("orders");

onSnapshot(collection(db,"orders"),(snapshot)=>{

container.innerHTML="";

snapshot.forEach((docSnap)=>{

let data = docSnap.data();

let itemsHTML="";

if(data.items){

data.items.forEach(item=>{
itemsHTML += `<li>${item.name} - ₹${item.price}</li>`;
});

}

container.innerHTML += `

<div class="card">

<h3>Order ID: ${docSnap.id}</h3>

<p><b>Customer:</b> ${data.customerName || "N/A"}</p>

<p><b>Phone:</b> ${data.phone || "N/A"}</p>

<p><b>Address:</b> ${data.address || "N/A"}</p>

<p><b>Total:</b> ₹${data.total}</p>

<p><b>Status:</b> ${data.status}</p>

<p><b>Items:</b></p>

<ul>
${itemsHTML}
</ul>

<button onclick="updateStatus('${docSnap.id}','Preparing')">
Preparing
</button>

<button onclick="updateStatus('${docSnap.id}','Delivered')">
Delivered
</button>

<hr>

</div>

`;

});

});

window.updateStatus = async function(id,status){

const orderRef = doc(db,"orders",id);

await updateDoc(orderRef,{
status: status
});

}

</script></body>
</html>
