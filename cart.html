<!DOCTYPE html>
<html>
<head>
<title>Your Cart</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Your Cart</h1>

<div id="cart-items"></div>

<h2 id="total"></h2>

<button onclick="placeOrder()">Place Order</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCIkDJkmm5FvMw1M_F1FviMwcG_httuwcA",
authDomain: "foodie-mart-3e2a0.firebaseapp.com",
projectId: "foodie-mart-3e2a0",
storageBucket: "foodie-mart-3e2a0.firebasestorage.app",
messagingSenderId: "591650958110",
appId: "1:591650958110:web:c453955af7c3bb0c77770f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let container = document.getElementById("cart-items");

let total = 0;

cart.forEach(item=>{

container.innerHTML += `

<div class="card">

<img src="${item.image}" width="100">

<h3>${item.name}</h3>

<p>₹${item.price}</p>

</div>

`;

total += item.price;

});

document.getElementById("total").innerText = "Total: ₹" + total;

window.placeOrder = async function(){

if(cart.length === 0){
alert("Cart is empty");
return;
}

await addDoc(collection(db,"orders"),{

items: cart,
total: total,
status: "pending",
time: new Date().toISOString()

});

alert("Order placed successfully!");

localStorage.removeItem("cart");

location.reload();

}

</script>

</body>
</html>
