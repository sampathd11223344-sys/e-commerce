<!DOCTYPE html><html>
<head>
<title>Your Cart</title>
<link rel="stylesheet" href="style.css">
</head><body><h1>Your Cart</h1><div id="cart-items"></div><h2 id="total"></h2><hr><h2>Delivery Details</h2><input id="customerName" placeholder="Your Name"><br><br>

<input id="phone" placeholder="Phone Number"><br><br>

<textarea id="address" placeholder="Full Delivery Address"></textarea><br><br>

<button onclick="placeOrder()">Place Order</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyCIkDJkmm5FvMw1M_F1FviMwcG_httuwcA",
authDomain:"foodie-mart-3e2a0.firebaseapp.com",
projectId:"foodie-mart-3e2a0",
storageBucket:"foodie-mart-3e2a0.appspot.com",
messagingSenderId:"591650958110",
appId:"1:591650958110:web:c453955af7c3bb0c77770f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let cart = JSON.parse(localStorage.getItem("cart")) || [];

const container = document.getElementById("cart-items");

function renderCart(){

container.innerHTML="";
let total=0;

cart.forEach((item,index)=>{

if(!item.qty) item.qty=1;

total += item.price * item.qty;

container.innerHTML += `

<div class="card">

<img src="${item.image}" width="100">

<h3>${item.name}</h3>

<p>₹${item.price}</p>

<div>

<button onclick="decreaseQty(${index})">-</button>

<span>${item.qty}</span>

<button onclick="increaseQty(${index})">+</button>

</div>

</div>

`;

});

document.getElementById("total").innerText="Total: ₹"+total;

localStorage.setItem("cart",JSON.stringify(cart));

}

window.increaseQty=function(i){

cart[i].qty++;

renderCart();

}

window.decreaseQty=function(i){

if(cart[i].qty>1){
cart[i].qty--;
}else{
cart.splice(i,1);
}

renderCart();

}

renderCart();

window.placeOrder = async function(){

const name=document.getElementById("customerName").value;
const phone=document.getElementById("phone").value;
const address=document.getElementById("address").value;

if(!name || !phone || !address){
alert("Enter delivery details");
return;
}

let total=0;

cart.forEach(item=>{
total += item.price * item.qty;
});

await addDoc(collection(db,"orders"),{

items:cart,
total:total,
status:"Pending",
customerName:name,
phone:phone,
address:address,
time:Date.now()

});

alert("Order placed successfully!");

localStorage.removeItem("cart");

window.location.href="index.html";

}

</script></body>
</html>
