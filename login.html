<!DOCTYPE html>
<html>
<head>
    <title>Login - Foodie Mart</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="form-container">
    <h2>Login</h2>
    <button onclick="googleLogin()">Sign in with Google</button>
</div>

<script type="module">

// 🔥 Import Firebase (Auth version)
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// ✅ YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCIkDJkmm5FvMw1M_F1FviMwcG_httuwcA",
  authDomain: "foodie-mart-3e2a0.firebaseapp.com",
  projectId: "foodie-mart-3e2a0",
  storageBucket: "foodie-mart-3e2a0.firebasestorage.app",
  messagingSenderId: "591650958110",
  appId: "1:591650958110:web:c453955af7c3bb0c77770f",
  measurementId: "G-P9T8K47HKK"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// Google Login Function
window.googleLogin = function() {
    signInWithPopup(auth, provider)
    .then((result) => {
        const user = result.user;

        // Save user locally
        localStorage.setItem("loggedInUser", JSON.stringify({
            name: user.displayName,
            email: user.email,
            photo: user.photoURL
        }));

        alert("Login successful!");
        window.location = "index.html";
    })
    .catch((error) => {
        alert(error.message);
    });
};

</script>

</body>
</html>
