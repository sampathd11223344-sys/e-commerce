<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Foodie Mart</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<h1>Foodie Mart</h1>

<nav>

<a href="index.html">Home</a>

<a href="cart.html">Cart (<span id="cart-count">0</span>)</a>

<a href="login.html">Login</a>

</nav>

</header>



<section class="hero">

<h2>Fast. Fresh. <span>Delivered.</span></h2>

<p>Your favourite meals just one click away.</p>

</section>



<div class="controls">

<input type="text" id="searchInput" placeholder="Search food..." onkeyup="filterProducts()">

<select id="categoryFilter" onchange="filterProducts()">

<option value="all">All</option>

<option value="fastfood">Fast Food</option>

<option value="drinks">Drinks</option>

<option value="desserts">Desserts</option>

</select>

</div>



<section class="products" id="product-list"></section>



<footer>

© 2026 Foodie Mart • Built by Sampath

</footer>



<div id="foodModal" class="modal">

<div class="modal-content">

<span class="close" onclick="closeModal()">&times;</span>

<img id="modalImage">

<h2 id="modalName"></h2>

<p id="modalPrice"></p>

<div class="rating">⭐ ⭐ ⭐ ⭐ ☆</div>

<button id="modalCartBtn">Add to Cart</button>

</div>

</div>



<script type="module" src="script.js"></script>

</body>

</html>
