<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Foodie Mart</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>Foodie Mart</h1>

<nav class="desktop-nav">

<a href="index.html">Home</a>
<a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
<a href="login.html">Login</a>

</nav>

</header>


<section class="hero">

<h2>Fast. Fresh. <span>Delivered.</span></h2>
<p>Your favourite meals just one click away.</p>

</section>


<div class="controls">

<input type="text" id="searchInput" placeholder="Search food..." onkeyup="filterProducts()">

<select id="categoryFilter" onchange="filterProducts()">

<option value="all">All</option>
<option value="fastfood">Fast Food</option>
<option value="drinks">Drinks</option>
<option value="desserts">Desserts</option>

</select>

</div>


<h2 class="section-title">🔥 Top Rated Foods</h2>

<section class="products" id="topFoods"></section>


<h2 class="section-title">🍔 All Foods</h2>

<section class="products" id="product-list"></section>


<footer>

© 2026 Foodie Mart • Built by Sampath

</footer>


<div id="foodModal" class="modal">

<div class="modal-content">

<span class="close" onclick="closeModal()">&times;</span>

<img id="modalImage">

<h2 id="modalName"></h2>

<p id="modalPrice"></p>

<div class="rating">⭐ ⭐ ⭐ ⭐ ☆</div>

<button id="modalCartBtn">Add to Cart</button>

</div>

</div>


<!-- MOBILE BOTTOM NAV -->

<div class="mobile-nav">

<a href="index.html">🏠<span>Home</span></a>

<a href="cart.html" class="cart-btn">
🛒
<span class="badge" id="mobile-cart-count">0</span>
<span>Cart</span>
</a>

<a href="login.html">👤<span>Login</span></a>

</div>


<script type="module" src="script.js"></script>

</body>
</html>
