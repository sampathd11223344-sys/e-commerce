<!DOCTYPE html><html>
<head>
<title>Admin Panel</title>
<link rel="stylesheet" href="style.css">
</head><body><h1>Add Food Product</h1><input id="name" placeholder="Food name"><input id="price" type="number" placeholder="Price"><input id="image" placeholder="Image URL"><button onclick="addProduct()">Add Product</button>

<h2>Manage Products</h2><div id="products"></div><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import { 
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
updateDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


const firebaseConfig = {
apiKey: "AIzaSyCIkDJkmm5FvMw1M_F1FviMwcG_httuwcA",
authDomain: "foodie-mart-3e2a0.firebaseapp.com",
projectId: "foodie-mart-3e2a0",
storageBucket: "foodie-mart-3e2a0.firebasestorage.app",
messagingSenderId: "591650958110",
appId: "1:591650958110:web:c453955af7c3bb0c77770f"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


const productList = document.getElementById("products");


window.addProduct = async function(){

const name = document.getElementById("name").value;
const price = Number(document.getElementById("price").value);
const image = document.getElementById("image").value;

if(!name || !price || !image){
alert("Fill all fields");
return;
}

await addDoc(collection(db,"products"),{
name:name,
price:price,
image:image
});

alert("Product Added");

document.getElementById("name").value="";
document.getElementById("price").value="";
document.getElementById("image").value="";

loadProducts();

}



async function loadProducts(){

productList.innerHTML="";

const snapshot = await getDocs(collection(db,"products"));

snapshot.forEach((docSnap)=>{

const data = docSnap.data();

productList.innerHTML += `

<div class="card">

<img src="${data.image}" width="120">

<h3>${data.name}</h3>

<p>₹${data.price}</p>

<button onclick="editProduct('${docSnap.id}','${data.name}',${data.price})">Edit</button>

<button onclick="deleteProduct('${docSnap.id}')">Delete</button>

</div>

`;

});

}



window.deleteProduct = async function(id){

await deleteDoc(doc(db,"products",id));

alert("Product Deleted");

loadProducts();

}



window.editProduct = async function(id,name,price){

let newName = prompt("Edit name",name);
let newPrice = prompt("Edit price",price);

if(!newName || !newPrice) return;

await updateDoc(doc(db,"products",id),{
name:newName,
price:Number(newPrice)
});

alert("Product Updated");

loadProducts();

}


loadProducts();

</script></body>
</html>
