<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Add Food Product</h2>

<input id="name" placeholder="Food name">
<input id="price" type="number" placeholder="Price">
<input id="image" type="file">

<button onclick="addProduct()">Add Product</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import { getFirestore, collection, addDoc }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCIkDJkmm5FvMw1M_F1FviMwcG_httuwcA",
authDomain: "foodie-mart-3e2a0.firebaseapp.com",
projectId: "foodie-mart-3e2a0",
storageBucket: "foodie-mart-3e2a0.firebasestorage.app",
messagingSenderId: "591650958110",
appId: "1:591650958110:web:c453955af7c3bb0c77770f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.addProduct = async function(){

let name=document.getElementById("name").value;
let price=document.getElementById("price").value;
let file=document.getElementById("image").files[0];

let formData=new FormData();
formData.append("image",file);

let response=await fetch(
"https://api.imgbb.com/1/upload?key=a0d56af5b2779899757ecc411a4c8b74",
{
method:"POST",
body:formData
});

let data=await response.json();

let imageURL=data.data.url;

await addDoc(collection(db,"products"),{
name:name,
price:Number(price),
image:imageURL
});

alert("Product Added Successfully");

document.getElementById("name").value="";
document.getElementById("price").value="";
}

</script>

</body>
</html>
