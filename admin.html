<!DOCTYPE html><html><head>
<title>Admin Panel</title>
<link rel="stylesheet" href="style.css">
</head><body><h1>Admin Panel</h1><nav class="admin-nav"><a href="admin.html">Products</a>

<a href="admin-orders.html">Orders</a>

<a href="admin-dashboard.html">Dashboard</a>

</nav><hr><h2>Add Food Product</h2><input id="name" placeholder="Food name"><input id="price" type="number" placeholder="Price"><select id="category">
<option value="fastfood">Fast Food</option>
<option value="drinks">Drinks</option>
<option value="desserts">Desserts</option>
</select><br><br>

<input type="file" id="image" onchange="previewImage()"><br><br>

<img id="preview" width="150" style="display:none;border-radius:10px"><br><br>

<button onclick="addProduct()">Add Product</button>

<hr><h2>Manage Products</h2><div id="products"></div><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


const firebaseConfig = {

apiKey: "AIzaSyCIkDJkmm5FvMw1M_F1FviMwcG_httuwcA",

authDomain: "foodie-mart-3e2a0.firebaseapp.com",

projectId: "foodie-mart-3e2a0",

storageBucket: "foodie-mart-3e2a0.appspot.com",

messagingSenderId: "591650958110",

appId: "1:591650958110:web:c453955af7c3bb0c77770f"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const API_KEY = "a0d56af5b2779899757ecc411a4c8b74";

const productList = document.getElementById("products");

window.previewImage = function(){

const file = document.getElementById("image").files[0];

const preview = document.getElementById("preview");

preview.src = URL.createObjectURL(file);

preview.style.display = "block";

}

window.addProduct = async function(){

const name = document.getElementById("name").value;

const price = Number(document.getElementById("price").value);

const category = document.getElementById("category").value;

const file = document.getElementById("image").files[0];

if(!name || !price || !file){

alert("Fill all fields");

return;

}

const formData = new FormData();

formData.append("image",file);

const response = await fetch(

"https://api.imgbb.com/1/upload?key="+API_KEY,

{
method:"POST",
body:formData
}

);

const data = await response.json();

const imageURL = data.data.url;

await addDoc(collection(db,"products"),{

name:name,
price:price,
category:category,
image:imageURL

});

alert("Product Added");

document.getElementById("name").value="";
document.getElementById("price").value="";
document.getElementById("image").value="";
document.getElementById("preview").style.display="none";

loadProducts();

}

async function loadProducts(){

productList.innerHTML="";

const snapshot = await getDocs(collection(db,"products"));

snapshot.forEach((docSnap)=>{

const data = docSnap.data();

productList.innerHTML += `

<div class="card">

<img src="${data.image}" width="120">

<h3>${data.name}</h3>

<p>₹${data.price}</p>

<p>Category: ${data.category}</p>

<button onclick="deleteProduct('${docSnap.id}')">
Delete
</button>

</div>

`;

});

}

window.deleteProduct = async function(id){

await deleteDoc(doc(db,"products",id));

alert("Product Deleted");

loadProducts();

}

loadProducts();

</script></body></html>
