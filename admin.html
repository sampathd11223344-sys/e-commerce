<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Add Food Product</h2>

<input id="name" placeholder="Food name">
<input id="price" type="number" placeholder="Price">
<input id="image" type="file">

<button onclick="addProduct()">Add Product</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
addDoc,
deleteDoc,
updateDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCIkDJkmm5FvMw1M_F1FviMwcG_httuwcA",
authDomain: "foodie-mart-3e2a0.firebaseapp.com",
projectId: "foodie-mart-3e2a0",
storageBucket: "foodie-mart-3e2a0.firebasestorage.app",
messagingSenderId: "591650958110",
appId: "1:591650958110:web:c453955af7c3bb0c77770f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const productList = document.getElementById("products");

async function loadProducts(){

productList.innerHTML="";

const snapshot = await getDocs(collection(db,"products"));

snapshot.forEach((docSnap)=>{

let data = docSnap.data();

productList.innerHTML += `

<div class="card">

<img src="${data.image}" width="120">

<h3>${data.name}</h3>

<p>₹${data.price}</p>

<button onclick="editProduct('${docSnap.id}','${data.name}',${data.price})">Edit</button>

<button onclick="deleteProduct('${docSnap.id}')">Delete</button>

</div>

`;

});

}

window.deleteProduct = async function(id){

await deleteDoc(doc(db,"products",id));

alert("Product deleted");

loadProducts();

}

window.editProduct = async function(id,name,price){

let newName = prompt("Edit product name",name);

let newPrice = prompt("Edit price",price);

if(newName && newPrice){

await updateDoc(doc(db,"products",id),{

name:newName,
price:Number(newPrice)

});

alert("Product updated");

loadProducts();

}

}

loadProducts();

</script>
</body>
</html>
